# Format, lint, build, and test on every push / PR to main.
#
# Mirrors the Ubuntu path in docs/DEVELOPMENT.md and pins Rust to the project
# MSRV (1.88, the ort / edition-2024 floor), so CI matches `nix develop` and a
# contributor who follows the developer guide gets the same result CI does.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege for GITHUB_TOKEN: this workflow only reads the repo
# (checkout + LFS); nothing here publishes or writes.
permissions:
  contents: read

# A newer push cancels the in-flight run on PRs only. On main every push
# keeps its run: two pushes in quick succession otherwise leave the first
# commit with cancelled (never-completed) checks, which once let a merge
# commit land on main untested.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Branch protection on `main` requires these four job names as status checks:
#   "fmt · clippy · build · test", "cargo-deny (advisories · licenses ·
#   duplicate versions)", "nix flake check", "fuzz (untrusted-input parsers)".
# Renaming a job below without updating the protection rule leaves a PR waiting
# on a check that never reports, so it can never merge. Change both together.
jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      # Actions are pinned to a commit SHA (the tag in the comment is what it
      # was) so a moved tag cannot change what runs. Dependabot bumps these.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Credentials stay persisted on this job only: `git lfs pull` below
        # needs them on a cache miss. The token is contents:read.

      # The ONNX models are ~257 MB of Git LFS objects; cache them keyed on
      # models/SHA256SUMS (changes exactly when the weights do) instead of
      # re-downloading against the LFS bandwidth quota every run.
      - name: Cache Git LFS objects (ONNX model weights)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('models/SHA256SUMS') }}

      - name: Pull model weights (Git LFS)
        run: git lfs pull

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev libpam0g-dev libtss2-dev

      - name: Install Rust 1.88 (MSRV) with rustfmt + clippy
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          # Pinned to a SHA, the action can't read the version from the tag, so
          # name the toolchain explicitly (it is a required input then).
          toolchain: "1.88.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Fetch the ONNX runtime (ort loads it dynamically at runtime)
        run: |
          ver=1.24.4
          curl -fsSLO "https://github.com/microsoft/onnxruntime/releases/download/v${ver}/onnxruntime-linux-x64-${ver}.tgz"
          tar xzf "onnxruntime-linux-x64-${ver}.tgz"
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime-linux-x64-${ver}/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: doc (broken intra-doc links are errors)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

      - name: build
        run: cargo build --release --locked

      - name: test
        run: cargo test --workspace --locked

      # The TPM-gated tests run against a software TPM: same TSS stack, no
      # hardware. IRLUME_TCTI is the production env override; swtpm state is
      # throwaway per run.
      - name: Start swtpm (software TPM)
        run: |
          sudo apt-get install -y --no-install-recommends swtpm libtss2-tcti-swtpm0
          mkdir -p /tmp/swtpm
          swtpm socket --tpm2 --tpmstate dir=/tmp/swtpm \
            --server type=tcp,port=2321,disconnect --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --daemon --pid file=/tmp/swtpm/pid

      - name: test (TPM-gated, against swtpm)
        run: |
          IRLUME_TCTI="swtpm:host=127.0.0.1,port=2321" cargo test -p irlume-core --lib --locked -- --ignored \
            seal_unseal_roundtrip_real_tpm arm_and_unseal_roundtrip reseal_only_when_stale tpm_key_and_recovery_lifecycle seal_unseal_pcrlock_roundtrip_provisioned_nv --test-threads=1
          IRLUME_TCTI="swtpm:host=127.0.0.1,port=2321" cargo test -p irlume-daemon --locked -- --ignored tpm_ --test-threads=1

      # Virtual cameras: v4l2loopback provides the V4L2 nodes, ffmpeg feeds
      # test patterns in the exact formats the capture paths negotiate
      # (YUYV 640x480 for RGB, GREY 640x400 for IR). Same idea as swtpm:
      # fake hardware, real code.
      - name: Start virtual cameras (v4l2loopback + ffmpeg feeders)
        run: |
          # Ubuntu's packaged v4l2loopback (0.12.x) predates this runner
          # kernel's V4L2 API and fails to load; build upstream at a pinned
          # commit instead. videodev (its dependency) lives in modules-extra.
          # v4l2loopback (built from a pinned upstream commit because Ubuntu's
          # 0.12.x won't load on the runner kernel) plus pam_wrapper/pamtester
          # for the PAM FFI tests. video8/9 are fed by ffmpeg; video10 is a
          # spare the camera streaming tests feed themselves.
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)" "linux-modules-extra-$(uname -r)" ffmpeg libpam-wrapper pamtester
          git clone https://github.com/umlaeute/v4l2loopback /tmp/v4l2loopback
          git -C /tmp/v4l2loopback checkout 9ef83fb9bc88e8f841786753c362ac52c580defc
          make -C /tmp/v4l2loopback -j"$(nproc)"
          sudo modprobe videodev
          sudo insmod /tmp/v4l2loopback/v4l2loopback.ko devices=3 video_nr=8,9,10 exclusive_caps=0
          # Let udev finish applying its default (root:video 0660) perms BEFORE
          # our chmod, otherwise a late udev event overrides it and a test opens
          # the node with EACCES ("permission denied"), an intermittent flake.
          sudo udevadm settle
          sudo chmod 666 /dev/video8 /dev/video9 /dev/video10
          nohup ffmpeg -loglevel error -re -f lavfi -i testsrc2=size=640x480:rate=30 -pix_fmt yuyv422 -f v4l2 /dev/video8 >/dev/null 2>&1 &
          nohup ffmpeg -loglevel error -re -f lavfi -i testsrc2=size=640x400:rate=30 -pix_fmt gray -f v4l2 /dev/video9 >/dev/null 2>&1 &
          # Poll until the fed nodes are actually readable (a feeder opening the
          # node can re-trigger udev), re-asserting perms each round, instead of a
          # blind sleep that can finish before the device is ready.
          for _ in $(seq 1 15); do
            sudo chmod 666 /dev/video8 /dev/video9 /dev/video10 2>/dev/null || true
            if [ -r /dev/video8 ] && [ -r /dev/video9 ]; then break; fi
            sleep 1
          done
          ls -l /dev/video8 /dev/video9 /dev/video10

      - name: test (camera + capture paths, against v4l2loopback)
        env:
          IRLUME_TEST_RGB_DEVICE: /dev/video8
          IRLUME_TEST_IR_DEVICE: /dev/video9
          IRLUME_TEST_SPARE_DEVICE: /dev/video10
          # Loopback nodes have no physical bus; the exact-path escape lets
          # verify_pinned accept just these (see THREAT_MODEL.md).
          IRLUME_TEST_ALLOW_VIRTUAL_CAMERA: /dev/video8,/dev/video9
        run: |
          cargo test -p irlume-camera -p irlume-auth -p irlume-daemon --locked -- --ignored loopback_ --test-threads=1
          cargo test -p irlume-cli --test cli_capture --locked -- --ignored loopback_ --test-threads=1
          cargo test -p irlume-cli --test cli_bench --locked -- --ignored bench_ --test-threads=1
          cargo test -p irlume-daemon --test shutdown --locked -- --ignored --test-threads=1

      - name: test (PAM FFI, against pam_wrapper)
        run: cargo test -p irlume-pam --locked -- --include-ignored --test-threads=1

  # Build + test on current stable, because that is what the packaging lanes
  # and most from-source users compile with. fmt/clippy stay on the MSRV job
  # only, so new-stable lint churn never blocks a PR. Not a required check.
  stable:
    name: test (stable)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Git LFS objects (ONNX model weights)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('models/SHA256SUMS') }}

      - name: Pull model weights (Git LFS)
        run: git lfs pull

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev libpam0g-dev libtss2-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Fetch the ONNX runtime (ort loads it dynamically at runtime)
        run: |
          ver=1.24.4
          curl -fsSLO "https://github.com/microsoft/onnxruntime/releases/download/v${ver}/onnxruntime-linux-x64-${ver}.tgz"
          tar xzf "onnxruntime-linux-x64-${ver}.tgz"
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime-linux-x64-${ver}/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: build
        run: cargo build --release --locked

      - name: test
        run: cargo test --workspace --locked

  # Statement coverage with a ratchet: the build fails if line coverage drops
  # below the floor. The floor moves up as tests are added, never down
  # (OpenSSF silver test_statement_coverage80 is the long-term target).
  # Not a required check.
  coverage:
    name: coverage (line-coverage ratchet)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Git LFS objects (ONNX model weights)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('models/SHA256SUMS') }}

      - name: Pull model weights (Git LFS)
        run: git lfs pull

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev libpam0g-dev libtss2-dev

      - name: Install stable Rust with llvm-tools
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Fetch the ONNX runtime (ort loads it dynamically at runtime)
        run: |
          ver=1.24.4
          curl -fsSLO "https://github.com/microsoft/onnxruntime/releases/download/v${ver}/onnxruntime-linux-x64-${ver}.tgz"
          tar xzf "onnxruntime-linux-x64-${ver}.tgz"
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime-linux-x64-${ver}/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Start swtpm (software TPM)
        run: |
          sudo apt-get install -y --no-install-recommends swtpm libtss2-tcti-swtpm0
          mkdir -p /tmp/swtpm
          swtpm socket --tpm2 --tpmstate dir=/tmp/swtpm \
            --server type=tcp,port=2321,disconnect --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --daemon --pid file=/tmp/swtpm/pid

      - name: Start virtual cameras (v4l2loopback + ffmpeg feeders)
        run: |
          # Ubuntu's packaged v4l2loopback (0.12.x) predates this runner
          # kernel's V4L2 API and fails to load; build upstream at a pinned
          # commit instead. videodev (its dependency) lives in modules-extra.
          # v4l2loopback (built from a pinned upstream commit because Ubuntu's
          # 0.12.x won't load on the runner kernel) plus pam_wrapper/pamtester
          # for the PAM FFI tests. video8/9 are fed by ffmpeg; video10 is a
          # spare the camera streaming tests feed themselves.
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)" "linux-modules-extra-$(uname -r)" ffmpeg libpam-wrapper pamtester
          git clone https://github.com/umlaeute/v4l2loopback /tmp/v4l2loopback
          git -C /tmp/v4l2loopback checkout 9ef83fb9bc88e8f841786753c362ac52c580defc
          make -C /tmp/v4l2loopback -j"$(nproc)"
          sudo modprobe videodev
          sudo insmod /tmp/v4l2loopback/v4l2loopback.ko devices=3 video_nr=8,9,10 exclusive_caps=0
          # Let udev finish applying its default (root:video 0660) perms BEFORE
          # our chmod, otherwise a late udev event overrides it and a test opens
          # the node with EACCES ("permission denied"), an intermittent flake.
          sudo udevadm settle
          sudo chmod 666 /dev/video8 /dev/video9 /dev/video10
          nohup ffmpeg -loglevel error -re -f lavfi -i testsrc2=size=640x480:rate=30 -pix_fmt yuyv422 -f v4l2 /dev/video8 >/dev/null 2>&1 &
          nohup ffmpeg -loglevel error -re -f lavfi -i testsrc2=size=640x400:rate=30 -pix_fmt gray -f v4l2 /dev/video9 >/dev/null 2>&1 &
          # Poll until the fed nodes are actually readable (a feeder opening the
          # node can re-trigger udev), re-asserting perms each round, instead of a
          # blind sleep that can finish before the device is ready.
          for _ in $(seq 1 15); do
            sudo chmod 666 /dev/video8 /dev/video9 /dev/video10 2>/dev/null || true
            if [ -r /dev/video8 ] && [ -r /dev/video9 ]; then break; fi
            sleep 1
          done
          ls -l /dev/video8 /dev/video9 /dev/video10

      - name: Coverage incl. TPM-gated and camera tests (fail under the ratchet floor)
        env:
          IRLUME_TEST_RGB_DEVICE: /dev/video8
          IRLUME_TEST_IR_DEVICE: /dev/video9
          IRLUME_TEST_SPARE_DEVICE: /dev/video10
          # Loopback nodes have no physical bus; the exact-path escape lets
          # verify_pinned accept just these (see THREAT_MODEL.md).
          IRLUME_TEST_ALLOW_VIRTUAL_CAMERA: /dev/video8,/dev/video9
        run: |
          cargo llvm-cov --no-report --workspace --locked
          IRLUME_TCTI="swtpm:host=127.0.0.1,port=2321" cargo llvm-cov --no-report -p irlume-core --lib --locked -- --ignored \
            seal_unseal_roundtrip_real_tpm arm_and_unseal_roundtrip reseal_only_when_stale tpm_key_and_recovery_lifecycle seal_unseal_pcrlock_roundtrip_provisioned_nv --test-threads=1
          IRLUME_TCTI="swtpm:host=127.0.0.1,port=2321" cargo llvm-cov --no-report -p irlume-daemon --locked -- --ignored tpm_ --test-threads=1
          cargo llvm-cov --no-report -p irlume-camera -p irlume-auth -p irlume-daemon --locked -- --ignored loopback_ --test-threads=1
          cargo llvm-cov --no-report -p irlume-cli --test cli_capture --locked -- --ignored loopback_ --test-threads=1
          cargo llvm-cov --no-report -p irlume-cli --test cli_bench --locked -- --ignored bench_ --test-threads=1
          cargo llvm-cov --no-report -p irlume-daemon --test shutdown --locked -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p irlume-pam --locked -- --include-ignored --test-threads=1
          cargo llvm-cov report --summary-only --fail-under-lines 79

  deny:
    name: cargo-deny (advisories · licenses · duplicate versions)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories bans licenses sources

  nix:
    name: nix flake check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      # No lfs: true here. flake check --no-build only evaluates the outputs
      # (flake structure, the package derivation, the NixOS module, the dev
      # shell); it never reads the ONNX model contents, so the LFS pointer
      # files left by a plain checkout are enough and the job stays fast.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix with flakes
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Evaluates packages.default, nixosModules.irlume, and the dev shell.
      # Catches eval and type errors in flake.nix and nix/*.nix before merge;
      # the full source build (packages.default) is covered by `nix build`
      # locally and the RPM/deb CI, so keep this eval-only and quick.
      - name: nix flake check
        run: nix flake check --no-build --show-trace

      # --no-build skips fixed-output derivations, so a stale vendor hash
      # (tss-esapi fork pin bump without a nix/package.nix hash update broke
      # `nix build` once while this job stayed green) or a stale ORT hash
      # passes eval. Realizing just the FODs fetches against the recorded
      # hashes and fails on exactly that class of bug, without building the
      # workspace.
      - name: Build fixed-output derivations (catches stale vendor hashes)
        run: nix build --no-link .#default.cargoDeps .#onnxruntime-bin

  fuzz:
    name: fuzz (untrusted-input parsers)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      # Every cargo/rustc in this job (including the child rustc that
      # cargo-fuzz spawns, which otherwise resolves the runner's default
      # stable and rejects the -Z sanitizer flags) uses the pinned nightly.
      RUSTUP_TOOLCHAIN: nightly-2026-07-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev libtss2-dev

      # Nightly is date-pinned so a rustc regression can't fail PRs that
      # changed nothing and masquerade as a fuzz finding. Bump the date (and
      # the cargo-fuzz version below) when touching the harness.
      - name: Install nightly Rust (cargo-fuzz needs it)
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # nightly
        with:
          toolchain: nightly-2026-07-15

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz

      # Build cargo-fuzz with nightly: it (via cargo-platform) needs a rustc
      # newer than the pinned 1.88, and nightly is the toolchain the targets
      # build under anyway (RUSTUP_TOOLCHAIN above selects it for the whole
      # job). Version-pinned for the same reason the nightly is date-pinned.
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      # The generated corpus accumulates across runs via the cache below, so
      # each 45-second round explores from everything earlier rounds found
      # instead of restarting from the 5 seed files.
      - name: Restore fuzz corpus from previous runs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-

      # Seed each corpus from the checked-in seeds (the generated corpus is not
      # committed), then fuzz for a bounded time. Replaying the seeds is a
      # regression gate: an input that once crashed a parser fails CI forever.
      # A crash exits non-zero and fails the job; the input is uploaded below.
      - name: Fuzz the IPC, envelope, and PCR-signature parsers
        working-directory: fuzz
        run: |
          for t in ipc_request pcr_signature sealed_envelope; do
            echo "::group::fuzz $t"
            mkdir -p "corpus/$t"
            cp -n "seeds/$t"/* "corpus/$t"/ 2>/dev/null || true
            cargo fuzz run "$t" -- -max_total_time=45 -rss_limit_mb=4096
            echo "::endgroup::"
          done

      - name: Upload crashing inputs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          # Short retention on purpose: a crashing input on a public repo is a
          # ready-made repro for a daemon-parser DoS, so keep it just long
          # enough to fix the bug.
          retention-days: 3
          if-no-files-found: ignore
