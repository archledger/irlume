# cargo-deny configuration; CI runs `cargo deny check advisories bans licenses`.

[licenses]
# Every dependency license must be on this list or the build fails. All entries
# are OSI-permissive or GPL-compatible; GPL-3.0 is present because irlume itself
# is GPL-3.0-or-later and the pamsm PAM binding is GPL-3.0-only. No non-commercial
# or network-copyleft (AGPL/SSPL/Commons-Clause) license is allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "0BSD",
    "LGPL-2.1-or-later",
    "GPL-3.0",         # deprecated SPDX form declared by pamsm 0.5.5
    "GPL-3.0-or-later", # irlume's own crates
]
# Do not fail when an allowed license happens to be unused after a dep bump.
unused-allowed-license = "allow"

[advisories]
version = 2
ignore = [
    # RUSTSEC-2023-0071 ("Marvin" RSA timing side-channel): no fixed release
    # exists upstream. irlume uses the rsa crate only to parse the systemd
    # PCR-signing PUBLIC key and verify signatures (crates/irlume-core/src/
    # pcrsig.rs); no private-key operations run, so the side channel has no
    # secret to leak here. Re-check when rsa publishes a fixed version.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2024-0436: `paste` is unmaintained (not a vulnerability). It is
    # a compile-time proc-macro pulled in by ratatui 0.29 for the TUI; no
    # paste code exists at runtime. Drop this when ratatui replaces it.
    "RUSTSEC-2024-0436",
]

[bans]
# Duplicate crate versions cost compile time and binary size but are not errors.
multiple-versions = "warn"
