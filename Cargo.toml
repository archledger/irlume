# lumen — Linux face authentication (PAM), successor to linhello.
# Placeholder name: `lumen`. Rename via find-replace `lumen` -> <yourname> across the tree.
[workspace]
resolver = "2"
members = [
    "crates/lumen-common",
    "crates/lumen-camera",
    "crates/lumen-vision",
    "crates/lumen-liveness",
    "crates/lumen-core",
    "crates/lumen-daemon",
    "crates/lumen-pam",
    "crates/lumen-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.75"
license = "GPL-3.0-or-later"
repository = "https://github.com/REPLACE_ME/lumen"
authors = ["REPLACE_ME"]

# Shared dependency versions. Heavy/native deps are listed but commented so the
# scaffold compiles offline as pure stubs — uncomment per crate as you implement.
[workspace.dependencies]
lumen-common   = { path = "crates/lumen-common" }
lumen-camera   = { path = "crates/lumen-camera" }
lumen-vision   = { path = "crates/lumen-vision" }
lumen-liveness = { path = "crates/lumen-liveness" }
lumen-core     = { path = "crates/lumen-core" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "2"
zeroize    = { version = "1", features = ["derive"] }

# --- native deps (enable as you build each crate) -----------------------------
# ort       = { version = "=2.0.0-rc.12", default-features = false, features = ["load-dynamic", "ndarray"] }
# ndarray   = "0.16"
# image     = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
# nokhwa    = { version = "0.10", features = ["input-native"] }   # V4L2 capture
# tss-esapi = "7"                                                 # TPM 2.0
# pamsm     = "0.5"                                               # PAM service module
# secrecy   = "0.10"

[profile.release]
lto = true
strip = true
