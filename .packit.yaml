# Packit: build irlume RPMs in Copr from signed GitHub tags (the linhello
# pipeline). Models are Git LFS; Copr's srpm build must pull them.
specfile_path: packaging/fedora/irlume.spec
upstream_package_name: irlume
downstream_package_name: irlume
# Tags are v-prefixed (v0.1.1); without this the RPM Version keeps the "v".
upstream_tag_template: "v{version}"

srpm_build_deps:
  - git-lfs

actions:
  post-upstream-clone:
    - git lfs install
    - git lfs pull

jobs:
  - job: copr_build
    trigger: release
    owner: archledger
    project: irlume
    # Packit submits builds with networking OFF regardless of the Copr
    # project's own enable_net setting; cargo needs crates.io in %build.
    enable_net: true
    targets:
      - fedora-stable
      - fedora-rawhide
    # onnxruntime is bundled in the RPM (Source1); no external Copr needed.

  # PR builds go to Packit's throwaway sandbox project
  # (packit/archledger-irlume-<PR>), NOT the production Copr: their
  # timestamped Release field outranks real releases, so a PR rpm in the
  # release repo becomes what `dnf install irlume` serves to everyone.
  - job: copr_build
    trigger: pull_request
    enable_net: true
    targets:
      - fedora-stable
